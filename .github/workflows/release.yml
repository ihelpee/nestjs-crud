name: Release

on:
  push:
    branches:
      - master
    paths:
      - "packages/**"
      - "yarn.lock"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.yml"
      - "**/*.json"
      - ".github/workflows/**"
      - "!docs/**"
      - "!README.md"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ihelpee_crud
          POSTGRES_PASSWORD: ihelpee_crud
          POSTGRES_DB: ihelpee_crud
        ports:
          - 5432:5432
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: ihelpee_crud
          MYSQL_USER: ihelpee_crud
          MYSQL_PASSWORD: ihelpee_crud
          MYSQL_ROOT_PASSWORD: ihelpee_crud
        ports:
          - 3306:3306
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          echo "registry=https://registry.npmjs.org/" > .npmrc
          echo "always-auth=false" >> .npmrc
          yarn install --frozen-lockfile

      - name: Build the project
        run: yarn build

      - name: Test all
        run: yarn test:coverage

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          echo "registry=https://registry.npmjs.org/" > .npmrc
          echo "always-auth=false" >> .npmrc
          yarn install --frozen-lockfile

      - name: Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git pull origin master --rebase

      - name: Publish to NPM
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npx lerna publish --conventional-commits --yes --no-verify-access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
